/* ── Sidebar ─────────────────────────────────────────────────────── */

  if (isMobile && !menuOpen) return null;
  return (
    <div style={{ width:240, minHeight:"100vh", background:C.primary, display:"flex", flexDirection:"column", flexShrink:0, boxShadow:"4px 0 20px rgba(0,0,0,0.2)", position: isMobile?"fixed":"relative", zIndex:100, top:0, left:0 }}>

/* ── Stat Card ───────────────────────────────────────────────────── */
function Stat({ icon, label, value, color, sub }) {
  return (
    <div style={{ background:C.white, borderRadius:14, padding:"18px 20px", flex:1, minWidth:140, borderLeft:`4px solid ${color}`, boxShadow:"0 2px 12px rgba(0,0,0,0.06)" }}>
      <div style={{ fontSize:26, marginBottom:8 }}>{icon}</div>
      <div style={{ fontSize:22, fontWeight:800, color:C.primary }}>{value}</div>
      <div style={{ fontSize:12, color:C.gray, marginTop:2 }}>{label}</div>
      {sub && <div style={{ fontSize:11, color, marginTop:4, fontWeight:600 }}>{sub}</div>}
    </div>
  );
}

        <h2 style={{ fontSize:22, fontWeight:800, color:C.primary, margin:0 }}>Welcome, {NGO.president} 👋</h2>
        <p style={{ color:C.gray, marginTop:4, fontSize:13 }}>{today} • Project CB0135 Active</p>
      </div>
      <div style={{ display:"flex", gap:14, flexWrap:"wrap", marginBottom:24 }}>
        <Stat icon="📁" label="Active Projects"     value="1"              color={C.accent}    sub="CB0135 Running"      />
        <Stat icon="📝" label="Total Reports"       value={reports.length} color={C.secondary} sub="Last 6 months data"  />

      </div>
      <div style={{ background:`linear-gradient(135deg,${C.primary},${C.secondary})`, borderRadius:16, padding:24, color:"#fff", marginBottom:20 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:12 }}>
          <div>
            <div style={{ background:"rgba(255,255,255,0.2)", display:"inline-block", padding:"3px 12px", borderRadius:20, fontSize:11, fontWeight:700, marginBottom:10 }}>ACTIVE PROJECT</div>

          <span>₹2,12,000 spent</span><span>42%</span><span>₹2,88,000 remaining</span>

            <div style={{ width:40, height:40, borderRadius:10, background:C.light, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>📋</div>

/* ── Daily Reports ───────────────────────────────────────────────── */
function DailyReports({ reports, setReports, isAdmin }) {
  const [form, setForm] = useState({ date:"", activity:"", participants:"", location:"", notes:"" });
  const [saved, setSaved] = useState(false);
  const inp = { width:"100%", padding:"10px 13px", border:`1.5px solid ${C.border}`, borderRadius:8, fontSize:13, outline:"none", boxSizing:"border-box" };
  const save = () => {
    if (!form.date || !form.activity) return;
    setReports(p => [...p, { ...form, id:Date.now(), participants:parseInt(form.participants)||0 }]);
    setForm({ date:"", activity:"", participants:"", location:"", notes:"" });
    setSaved(true); setTimeout(() => setSaved(false), 2500);
  };
  const total = reports.reduce((a,r) => a+r.participants, 0);
  return (
    <div>
      <h2 style={{ fontSize:22, fontWeight:800, color:C.primary, marginBottom:20 }}>Daily Activity Reports</h2>
      {isAdmin && (
      <div style={{ background:C.white, borderRadius:14, padding:24, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", marginBottom:22 }}>
        <h3 style={{ margin:"0 0 16px", color:C.primary, fontWeight:700 }}>➕ Add New Activity Report</h3>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:13 }}>
          <div>
            <label style={{ fontSize:11.5, color:C.gray, display:"block", marginBottom:5, fontWeight:600 }}>Date *</label>
            <input type="date" style={inp} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} />
          </div>
          <div>
            <label style={{ fontSize:11.5, color:C.gray, display:"block", marginBottom:5, fontWeight:600 }}>Activity Name *</label>
            <input type="text" placeholder="e.g. Skill Training" style={inp} value={form.activity} onChange={e=>setForm(f=>({...f,activity:e.target.value}))} />
          </div>
          <div>
            <label style={{ fontSize:11.5, color:C.gray, display:"block", marginBottom:5, fontWeight:600 }}>Participants</label>
            <input type="number" placeholder="0" style={inp} value={form.participants} onChange={e=>setForm(f=>({...f,participants:e.target.value}))} />
          </div>
          <div>
            <label style={{ fontSize:11.5, color:C.gray, display:"block", marginBottom:5, fontWeight:600 }}>Location</label>
            <input type="text" placeholder="Village / City" style={inp} value={form.location} onChange={e=>setForm(f=>({...f,location:e.target.value}))} />
          </div>
          <div style={{ gridColumn:"2/4" }}>
            <label style={{ fontSize:11.5, color:C.gray, display:"block", marginBottom:5, fontWeight:600 }}>Notes</label>
            <input type="text" placeholder="Brief description" style={inp} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} />
          </div>
        </div>
        <div style={{ marginTop:16, display:"flex", gap:12, alignItems:"center" }}>
          <button onClick={save} style={{ background:C.primary, color:"#fff", border:"none", borderRadius:8, padding:"10px 24px", fontWeight:700, fontSize:13 }}>💾 Save Report</button>
          {saved && <span style={{ color:C.secondary, fontWeight:600, fontSize:13 }}>✅ Saved successfully!</span>}
        </div>
      </div>
      )}
      <div style={{ background:C.white, borderRadius:14, padding:22, boxShadow:"0 2px 12px rgba(0,0,0,0.06)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <h3 style={{ margin:0, color:C.primary, fontWeight:700 }}>All Reports ({reports.length})</h3>
          <span style={{ fontSize:12, color:C.gray, background:C.light, padding:"4px 12px", borderRadius:20 }}>Project: CB0135</span>
        </div>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", fontSize:12.5 }}>
            <thead>
              <tr style={{ background:C.primary }}>
                {["#","Date","Activity","Participants","Location","Notes"].map(h=>(
                  <th key={h} style={{ padding:"10px 12px", textAlign:"left", color:"#fff", fontWeight:700, fontSize:12 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[...reports].reverse().map((r,i)=>(
                <tr key={r.id} style={{ borderBottom:`1px solid ${C.border}`, background:i%2===0?"#fff":C.light }}>
                  <td style={{ padding:"9px 12px", color:C.gray }}>{reports.length-i}</td>
                  <td style={{ padding:"9px 12px", fontWeight:600, color:C.primary }}>{r.date}</td>
                  <td style={{ padding:"9px 12px" }}>{r.activity}</td>
                  <td style={{ padding:"9px 12px", textAlign:"center" }}>
                    <span style={{ background:"#dbeafe", color:"#1e40af", padding:"2px 10px", borderRadius:12, fontWeight:700 }}>{r.participants}</span>
                  </td>
                  <td style={{ padding:"9px 12px", color:C.gray }}>{r.location}</td>
                  <td style={{ padding:"9px 12px", color:C.gray, maxWidth:160, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.notes}</td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr style={{ background:C.light }}>
                <td colSpan={3} style={{ padding:"9px 12px", fontWeight:700, color:C.primary }}>TOTAL PARTICIPANTS</td>
                <td style={{ padding:"9px 12px", textAlign:"center", fontWeight:800, color:C.primary }}>{total}</td>
                <td colSpan={2}/>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ── Gallery ─────────────────────────────────────────────────────── */
function Gallery({ isAdmin }) {
  const [photos, setPhotos] = useState(DEMO_PHOTOS);
  const [msg, setMsg]       = useState("");
  const upload = e => {
    const files = Array.from(e.target.files||[]);
    setPhotos(p=>[...p,...files.map((f,i)=>({ id:Date.now()+i, label:f.name.replace(/\.[^.]+$/,""), emoji:"📷", date:new Date().toISOString().split("T")[0], tag:"Activity", url:URL.createObjectURL(f) }))]);
    setMsg(`✅ ${files.length} photo(s) uploaded!`); setTimeout(()=>setMsg(""),3000);
  };
  const removePhoto = (id) => setPhotos(p => p.filter(ph => ph.id !== id));
  return (
    <div>
      <h2 style={{ fontSize:22, fontWeight:800, color:C.primary, marginBottom:6 }}>Photo Gallery</h2>
      <p style={{ color:C.gray, fontSize:13, marginBottom:18 }}>Project CB0135 — Activity Photographs</p>

      {/* Upload bar — ADMIN ONLY */}
      {isAdmin && (
      <div style={{ background:C.white, borderRadius:12, padding:18, marginBottom:20, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", display:"flex", gap:20, alignItems:"center", flexWrap:"wrap" }}>
        <label style={{ background:C.primary, color:"#fff", padding:"10px 20px", borderRadius:8, fontWeight:700, fontSize:13 }}>
          📤 Upload JPG Photos
          <input type="file" accept="image/jpeg,image/jpg" multiple style={{ display:"none" }} onChange={upload} />
        </label>
        <div>
          <div style={{ fontSize:13, color:C.gray, marginBottom:5 }}>{photos.length} / 24 photos</div>
          <div style={{ background:C.light, borderRadius:100, height:7, width:200, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${Math.min(100,(photos.length/24)*100)}%`, background:photos.length>=24?C.secondary:C.accent, borderRadius:100 }} />
          </div>
        </div>
        {msg && <span style={{ color:C.secondary, fontWeight:600, fontSize:13 }}>{msg}</span>}
        {photos.length>=24 && <span style={{ color:C.secondary, fontWeight:700 }}>✅ Requirement met!</span>}
      </div>
      )}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:14 }}>
        {photos.map(p=>(
          <div key={p.id} style={{ background:C.white, borderRadius:12, overflow:"hidden", boxShadow:"0 2px 10px rgba(0,0,0,0.07)", position:"relative" }}>
            {isAdmin && (
              <button onClick={()=>removePhoto(p.id)} style={{ position:"absolute", top:6, right:6, background:"rgba(192,57,43,0.85)", color:"#fff", border:"none", borderRadius:6, width:24, height:24, fontSize:13, fontWeight:700, zIndex:2 }}>✕</button>
            )}
            <div style={{ height:110, background:p.url?`url(${p.url}) center/cover`:`linear-gradient(135deg,${C.light},${C.border})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:36 }}>
              {!p.url && p.emoji}
            </div>
            <div style={{ padding:"9px 11px" }}>
              <div style={{ fontSize:11.5, fontWeight:600, color:C.primary, marginBottom:3, lineHeight:1.3 }}>{p.label}</div>
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <span style={{ fontSize:10.5, color:C.gray }}>{p.date}</span>
                <span style={{ fontSize:10, background:C.light, color:C.secondary, padding:"2px 7px", borderRadius:10, fontWeight:600 }}>{p.tag}</span>
              </div>
            </div>
          </div>
        ))}
        {/* Empty slots — admin only */}
        {isAdmin && Array.from({length:Math.max(0,24-photos.length)}).map((_,i)=>(
          <div key={`e${i}`} style={{ height:155, background:C.light, borderRadius:12, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", border:`2px dashed ${C.border}` }}>
            <span style={{ fontSize:28, color:C.border }}>📷</span>
            <span style={{ fontSize:10, marginTop:6, color:C.gray }}>{photos.length+i+1}/24</span>
          </div>
        ))}
        {/* Public message if no photos */}
        {!isAdmin && photos.length===0 && (
          <div style={{ gridColumn:"1/5", textAlign:"center", padding:40, color:C.gray }}>
            <div style={{ fontSize:40, marginBottom:12 }}>🖼️</div>
            <div style={{ fontWeight:600 }}>Photos will be displayed here</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Generate Report ─────────────────────────────────────────────── */

/* ── Admin Login Modal ───────────────────────────────────────────── */
function LoginModal({ onLogin, onClose }) {
  const [pw, setPw]   = useState("");
  const [err, setErr] = useState(false);
  const attempt = () => {
    if (pw === ADMIN_PASSWORD) { onLogin(); setErr(false); }
    else { setErr(true); setTimeout(()=>setErr(false), 2000); }
  };
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ background:"#fff", borderRadius:16, padding:36, width:320, boxShadow:"0 8px 40px rgba(0,0,0,0.2)" }}>
        <div style={{ textAlign:"center", marginBottom:24 }}>
          <div style={{ fontSize:40, marginBottom:10 }}>🔐</div>
          <div style={{ fontWeight:800, fontSize:18, color:C.primary }}>Admin Login</div>
          <div style={{ fontSize:13, color:C.gray, marginTop:4 }}>Enter password to access admin features</div>
        </div>
        <input
          type="password"
          placeholder="Enter admin password"
          value={pw}
          onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&attempt()}
          style={{ width:"100%", padding:"11px 14px", border:`2px solid ${err?C.accent:C.border}`, borderRadius:8, fontSize:14, outline:"none", boxSizing:"border-box", marginBottom:12 }}
        />
        {err && <div style={{ color:C.accent, fontSize:12, marginBottom:10, textAlign:"center", fontWeight:600 }}>❌ Wrong password. Try again.</div>}
        <button onClick={attempt} style={{ width:"100%", background:C.primary, color:"#fff", border:"none", borderRadius:8, padding:"11px", fontWeight:700, fontSize:14, marginBottom:10 }}>Login as Admin</button>
        <button onClick={onClose} style={{ width:"100%", background:C.light, color:C.gray, border:"none", borderRadius:8, padding:"11px", fontWeight:600, fontSize:13 }}>Cancel</button>
      </div>
    </div>
  );
}

/* ── App Root ─────────────────────────────────────────────────────── */
function App() {
  const [active,    setActive]    = useState("Dashboard");
  const [reports,   setReports]   = useState(SAMPLE_REPORTS);
  const [menuOpen,  setMenuOpen]  = useState(false);
  const [isAdmin,   setIsAdmin]   = useState(false);
  const [showLogin, setShowLogin] = useState(false);

  return (
    <div style={{ display:"flex", minHeight:"100vh", background:C.light }}>
      <Sidebar active={active} setActive={setActive} menuOpen={menuOpen} setMenuOpen={setMenuOpen} />
      <div style={{ flex:1, display:"flex", flexDirection:"column" }}>
        {/* Top bar */}
        <div style={{ display:"flex", alignItems:"center", gap:12, padding:"14px 20px", background:C.primary, boxShadow:"0 2px 8px rgba(0,0,0,0.15)" }}>
          <button onClick={()=>setMenuOpen(m=>!m)} style={{ background:"rgba(255,255,255,0.15)", border:"none", color:"#fff", borderRadius:8, padding:"6px 10px", fontSize:18 }}>☰</button>
          <span style={{ color:"#fff", fontWeight:700, fontSize:14, flex:1 }}>🌱 ARDF NGO Management</span>

          {/* Admin toggle button */}
          {isAdmin ? (
            <button onClick={()=>setIsAdmin(false)} style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.3)", color:"#fff", borderRadius:8, padding:"6px 14px", fontSize:12, fontWeight:600 }}>
              🔓 Admin Mode • Logout
            </button>
          ) : (
            <button onClick={()=>setShowLogin(true)} style={{ background:C.accent, border:"none", color:"#fff", borderRadius:8, padding:"6px 14px", fontSize:12, fontWeight:600 }}>
              🔐 Admin Login
            </button>
          )}
        </div>

        {/* Admin banner */}
        {isAdmin && (
          <div style={{ background:"#fef3c7", borderBottom:`2px solid ${C.gold}`, padding:"8px 24px", fontSize:12.5, color:"#92400e", fontWeight:600, display:"flex", alignItems:"center", gap:8 }}>
            🔓 You are logged in as Admin — Upload, Add Reports & Delete features are enabled
          </div>
        )}

        <main style={{ flex:1, padding:"24px 24px 40px", overflowY:"auto" }}>
          {active==="Dashboard" && <Dashboard  reports={reports} />}
          {active==="Projects"  && <Projects />}
          {active==="Reports"   && <DailyReports reports={reports} setReports={setReports} isAdmin={isAdmin} />}
          {active==="Gallery"   && <Gallery isAdmin={isAdmin} />}
          {active==="Generate"  && <GenerateReport reports={reports} />}
          {active==="Profile"   && <Profile />}
          {active==="Info"      && <SoftwareInfo />}
        </main>
      </div>
      {menuOpen && <div onClick={()=>setMenuOpen(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", zIndex:99 }} />}
      {showLogin && <LoginModal onLogin={()=>{ setIsAdmin(true); setShowLogin(false); }} onClose={()=>setShowLogin(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
